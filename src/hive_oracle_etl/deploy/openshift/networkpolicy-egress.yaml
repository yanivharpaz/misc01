# Optional. Use only if your project enforces NetworkPolicy egress restrictions.
# Replace CIDRs and ports with your HiveServer2 and Oracle service endpoints.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hive-oracle-etl-egress
  labels:
    app.kubernetes.io/name: hive-oracle-etl
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hive-oracle-etl
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.10.10.10/32
      ports:
        - protocol: TCP
          port: 10000
    - to:
        - ipBlock:
            cidr: 10.20.20.20/32
      ports:
        - protocol: TCP
          port: 1521
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
